<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WorldConq — TikTok Live Territory Wars</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;background:#020810;color:#d0e4f8;font-family:Rajdhani,sans-serif;overflow:hidden}
#app{display:grid;grid-template-columns:230px 1fr 245px;grid-template-rows:54px 1fr 62px;height:100vh}

#hd{grid-column:1/4;display:flex;align-items:center;padding:10px;background:#060f1e;border-bottom:1px solid #00d4ff33}
.logo{color:#00d4ff;font-family:Orbitron;font-weight:900;letter-spacing:3px}
.hstats{margin-left:auto;display:flex;gap:20px}
.hv{color:#00d4ff;font-family:Orbitron}

#lf,#rt{background:#060f1e;overflow:auto}
#mp{position:relative;background:#020e1a}

.country{fill:#071628;stroke:#0a2040;cursor:pointer}
.country:hover{fill:#0e2a4a}

#world-svg{width:100%;height:100%}

#lb-list{padding:10px}
.gi{padding:6px;border-bottom:1px solid #ffffff10;font-size:12px}

button{cursor:pointer}
</style>
</head>

<body>

<div id="app">

<header id="hd">
  <div class="logo">🌍 WORLDCONQ</div>

  <div class="hstats">
    <div>Players: <span class="hv" id="h-players">0</span></div>
    <div>Countries: <span class="hv" id="h-countries">0</span></div>
    <div>Gifts: <span class="hv" id="h-gifts">0</span></div>
  </div>
</header>

<aside id="lf">
  <h3 style="padding:10px">🏆 Leaderboard</h3>
  <div id="lb-list"></div>
</aside>

<main id="mp">
  <svg id="world-svg"></svg>
</main>

<aside id="rt">
  <h3 style="padding:10px">🎁 Feed</h3>
  <div id="gift-list"></div>
</aside>

<footer style="grid-column:1/4;background:#060f1e;display:flex;align-items:center;padding:10px;gap:10px;border-top:1px solid #00d4ff33">
  <button onclick="toggleSim()">▶ Start</button>
  <button onclick="resetGame()">Reset</button>
</footer>

</div>

<script>

// ---------------- STATE ----------------
let players = {};
let countries = {};
let simRunning = false;
let simTimer;

const PLAYER_NAMES = ["Neo","Storm","Luna","Zero","Ace","Nova","Ray"];
const COLORS = ["#ff4757","#1e90ff","#2ed573","#ffa502","#a55eea"];

// ---------------- INIT MAP ----------------
window.addEventListener("load", initMap);

async function initMap(){

  const W = window.innerWidth * 0.6;
  const H = window.innerHeight * 0.9;

  const svg = d3.select("#world-svg")
    .attr("viewBox", `0 0 ${W} ${H}`);

  const projection = d3.geoNaturalEarth1()
    .scale(W/6.5)
    .translate([W/2,H/2]);

  const path = d3.geoPath().projection(projection);

  const world = await d3.json(
    "https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json"
  );

  const features = topojson.feature(world, world.objects.countries).features;

  svg.selectAll("path")
    .data(features)
    .enter()
    .append("path")
    .attr("class","country")
    .attr("d",path)
    .on("click",(e,d)=>clickRegion(d.id));

}

// ---------------- GAME ----------------
function addPlayer(name){
  const id = "p"+name;
  players[id] = {
    name,
    score:0,
    color:COLORS[Math.floor(Math.random()*COLORS.length)]
  };
  updateUI();
  return id;
}

function clickRegion(id){
  let pid = Object.keys(players)[0];
  if(!pid) pid = addPlayer("Player");

  players[pid].score += 10;

  countries[id] = pid;

  updateUI();
  updateLB();
}

// ---------------- UI ----------------
function updateUI(){
  document.getElementById("h-players").textContent = Object.keys(players).length;
  document.getElementById("h-countries").textContent = Object.keys(countries).length;
}

function updateLB(){
  const lb = document.getElementById("lb-list");
  lb.innerHTML = "";

  Object.values(players)
    .sort((a,b)=>b.score-a.score)
    .forEach(p=>{
      const div = document.createElement("div");
      div.className="gi";
      div.textContent = `${p.name} - ${p.score}`;
      lb.appendChild(div);
    });
}

// ---------------- SIM ----------------
function toggleSim(){
  simRunning = !simRunning;

  if(simRunning){
    simTimer = setInterval(()=>{
      const name = PLAYER_NAMES[Math.floor(Math.random()*PLAYER_NAMES.length)];
      const id = addPlayer(name);

      players[id].score += Math.floor(Math.random()*20);
      updateLB();
    },1200);
  } else {
    clearInterval(simTimer);
  }
}

// ---------------- RESET ----------------
function resetGame(){
  players = {};
  countries = {};
  updateUI();
  updateLB();
}

</script>

</body>
</html>
